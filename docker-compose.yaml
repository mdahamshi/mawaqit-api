version: "3"

services:
  mawaqit-api:
    image: mrsofiane/mawaqit-api:latest
    ports:
      - "80:80"
    depends_on:
      - mawaqit-api-redis
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/api/v1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mawaqit-api-redis:
    image: redis:alpine3.18
    ports:
      - "6379:6379"